<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Piano – Abish Palafox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .piano {
            position: relative;
            display: inline-flex;
            background: #1a1a1a;
            padding: 20px 20px 0 20px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            user-select: none;
        }

        .white-key {
            width: 60px;
            height: 200px;
            background: white;
            border: 1px solid #aaa;
            border-radius: 0 0 8px 8px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-size: 13px;
            font-weight: bold;
            color: #888;
            margin: 0 1px;
            z-index: 1;
            transition: background 0.06s;
        }

        .white-key:active {
            filter: brightness(0.75);
        }

        .black-key {
            width: 38px;
            height: 120px;
            background: #222;
            border-radius: 0 0 5px 5px;
            position: absolute;
            top: 20px;
            cursor: pointer;
            z-index: 2;
            transition: background 0.06s;
        }

        .black-key:active, .black-key.playing {
            background: #555;
        }

        #noteDisplay {
            font-size: 56px;
            font-weight: bold;
            min-height: 75px;
            color: #0d6efd;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">&#8592; Abish Palafox</a>
    </div>
</nav>

<div class="container text-center mt-5">
    <h1 class="mb-1">Vocal Piano</h1>
    <p class="text-muted mb-3">Press a key to hear a woman sing the note</p>

    <div id="noteDisplay" class="mb-4">&#9834;</div>

    <div style="overflow-x: auto;">
        <div class="d-flex justify-content-center mb-4">
            <div class="piano" id="piano"></div>
        </div>
    </div>

    <p class="text-muted small">Keyboard: &nbsp; A &nbsp; S &nbsp; D &nbsp; F &nbsp; G &nbsp; H &nbsp; J &nbsp; K</p>
    <p id="voiceInfo" class="text-muted small mt-1"></p>
</div>

<script>
    const notes = [
        { name: 'C4',  label: 'Do',  freq: 261.63, type: 'white', color: '#ff4d4d' },
        { name: 'C#4', label: 'C#',  freq: 277.18, type: 'black', after: 0 },
        { name: 'D4',  label: 'Re',  freq: 293.66, type: 'white', color: '#ff9900' },
        { name: 'D#4', label: 'D#',  freq: 311.13, type: 'black', after: 1 },
        { name: 'E4',  label: 'Mi',  freq: 329.63, type: 'white', color: '#ffe033' },
        { name: 'F4',  label: 'Fa',  freq: 349.23, type: 'white', color: '#4dcc55' },
        { name: 'F#4', label: 'F#',  freq: 369.99, type: 'black', after: 3 },
        { name: 'G4',  label: 'Sol', freq: 392.00, type: 'white', color: '#33bbff' },
        { name: 'G#4', label: 'G#',  freq: 415.30, type: 'black', after: 4 },
        { name: 'A4',  label: 'La',  freq: 440.00, type: 'white', color: '#4d79ff' },
        { name: 'A#4', label: 'A#',  freq: 466.16, type: 'black', after: 5 },
        { name: 'B4',  label: 'Si',  freq: 493.88, type: 'white', color: '#bb44ff' },
        { name: 'C5',  label: 'Do',  freq: 523.25, type: 'white', color: '#ff4d4d' },
    ];

    const keyboardMap = {
        'a': 'C4', 's': 'D4', 'd': 'E4', 'f': 'F4',
        'g': 'G4', 'h': 'A4', 'j': 'B4', 'k': 'C5'
    };

    // build piano keys
    const piano = document.getElementById('piano');
    const keyElements = {};

    notes.forEach(note => {
        const el = document.createElement('div');
        if (note.type === 'white') {
            el.className = 'white-key';
            el.textContent = note.label;
            el.style.background = note.color;
            el.style.color = '#333';
            piano.appendChild(el);
        } else {
            el.className = 'black-key';
            el.style.left = (20 + note.after * 62 + 40) + 'px';
            piano.appendChild(el);
        }
        keyElements[note.name] = el;
        el.addEventListener('mousedown', () => triggerNote(note));
        el.addEventListener('touchstart', e => { e.preventDefault(); triggerNote(note); }, { passive: false });
    });

    document.addEventListener('keydown', e => {
        if (e.repeat) return;
        const name = keyboardMap[e.key.toLowerCase()];
        if (name) triggerNote(notes.find(n => n.name === name));
    });

    // --- audio setup ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // --- play note ---
    function triggerNote(note) {
        if (!note) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        // update display
        document.getElementById('noteDisplay').textContent = note.label || note.name;

        // flash key darker when pressed
        const el = keyElements[note.name];
        el.style.filter = 'brightness(0.65)';
        setTimeout(() => el.style.filter = '', 400);

        playPiano(note.freq);
    }

    // piano sound: sharp attack, then fades like a real piano key
    function playPiano(freq) {
        const now = audioCtx.currentTime;
        const dur = 2.0;

        // main tone (sine) + a bit of higher harmonic for brightness
        const osc1 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.value = freq;

        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2;

        const g1 = audioCtx.createGain();
        g1.gain.value = 0.8;
        const g2 = audioCtx.createGain();
        g2.gain.value = 0.15;

        osc1.connect(g1);
        osc2.connect(g2);

        // envelope: instant attack, then decays like a piano
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0.001, now);
        env.gain.linearRampToValueAtTime(0.9, now + 0.01);  // very fast attack
        env.gain.exponentialRampToValueAtTime(0.001, now + dur); // long decay

        g1.connect(env);
        g2.connect(env);
        env.connect(audioCtx.destination);

        osc1.start(now); osc1.stop(now + dur);
        osc2.start(now); osc2.stop(now + dur);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
